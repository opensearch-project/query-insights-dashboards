name: Cypress e2e integration tests workflow for QI-WLM interaction
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "*"
env:
  GRADLE_VERSION: '7.6.1'
  CYPRESS_VIDEO: true
  CYPRESS_SCREENSHOT_ON_RUN_FAILURE: true

jobs:
  tests:
    name: Run Cypress E2E tests for QI-WLM interaction
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            cypress_cache_folder: ~/.cache/Cypress
    runs-on: ${{ matrix.os }}
    env:
      CI: 1
      TERM: xterm
      NODE_OPTIONS: '--max-old-space-size=6144 --dns-result-order=ipv4first'
    steps:

      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Set env
        run: |
          opensearch_version=$(node -p "require('./package.json').opensearchDashboards.version")
          plugin_version=$(node -p "require('./package.json').version")
          major_version=$(echo $opensearch_version | cut -d. -f1)
          minor_version=$(echo $opensearch_version | cut -d. -f2)
          opensearch_bare_version=$opensearch_version
          opensearch_version=${opensearch_version}-SNAPSHOT
          plugin_version=${plugin_version}-SNAPSHOT
          branch_version=${major_version}.${minor_version}
          os_branch=$branch_version
          opensearch_dashboards_branch=$branch_version
          query_insights_branch=$branch_version
          base_branch=${{ github.base_ref }}
          ref_name=${{ github.ref_name }}
          if [ "$base_branch" = "main" ] || [ "$ref_name" = "main" ]; then
            os_branch=main
            opensearch_dashboards_branch=main
            query_insights_branch=main
          fi
          echo "OS_BRANCH=$os_branch" >> $GITHUB_ENV
          echo "OPENSEARCH_DASHBOARDS_VERSION=$opensearch_dashboards_branch" >> $GITHUB_ENV
          echo "QUERY_INSIGHTS_BRANCH=$query_insights_branch" >> $GITHUB_ENV
          echo "OPENSEARCH_VERSION=$opensearch_version" >> $GITHUB_ENV
          echo "OPENSEARCH_BARE_VERSION=$opensearch_bare_version" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
        shell: bash

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Checkout Query Insights
        uses: actions/checkout@v4
        with:
          path: query-insights
          repository: opensearch-project/query-insights
          ref: ${{ env.QUERY_INSIGHTS_BRANCH }}

      - name: Checkout OpenSearch
        uses: actions/checkout@v4
        with:
          path: OpenSearch
          repository: opensearch-project/OpenSearch
          ref: ${{ env.OS_BRANCH }}

      - name: Build WLM and autotagging-commons plugins
        run: |
          cd OpenSearch
          ./gradlew :modules:autotagging-commons:assemble :plugins:workload-management:assemble
          cp modules/autotagging-commons/build/distributions/autotagging-commons-*.zip "$GITHUB_WORKSPACE/autotagging-commons.zip"
          cp plugins/workload-management/build/distributions/workload-management-*.zip "$GITHUB_WORKSPACE/wlm.zip"
        shell: bash

      - name: Build Query Insights plugin zip
        run: |
          cd query-insights
          mkdir -p plugins
          cp "$GITHUB_WORKSPACE/autotagging-commons.zip" plugins/
          cp "$GITHUB_WORKSPACE/wlm.zip" plugins/

          python3 - <<'EOF'
          import re
          with open('build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(r'spotless \{.*?\}\n\}', '', content, flags=re.DOTALL)
          content = content.replace('check.dependsOn spotlessCheck\n', '')
          with open('build.gradle', 'w') as f:
              f.write(content)
          EOF

          ./gradlew assemble -Dopensearch.version=${{ env.OPENSEARCH_VERSION }}
          find build/distributions/ -name "*.zip" -exec cp {} "$GITHUB_WORKSPACE/query-insights.zip" \;
        shell: bash

      - name: Run OpenSearch with plugins
        uses: derek-ho/start-opensearch@v9
        with:
          opensearch-version: ${{ env.OPENSEARCH_BARE_VERSION }}
          plugins: "file:$GITHUB_WORKSPACE/autotagging-commons.zip,file:$GITHUB_WORKSPACE/wlm.zip,file:$GITHUB_WORKSPACE/query-insights.zip"
          security-enabled: false
          jdk-version: 21

      - name: Enable WLM and create workload groups
        run: |
          curl -X PUT "http://localhost:9200/_cluster/settings" \
            -H 'Content-Type: application/json' \
            -d '{"persistent":{"wlm.workload_group.mode":"enabled"}}'

          curl -s -H 'Content-Type: application/json' \
            -X PUT 'http://localhost:9200/_wlm/workload_group' \
            -d '{"name":"analytics_group","resiliency_mode":"soft","resource_limits":{"cpu":0.3,"memory":0.3}}'

          curl -s -H 'Content-Type: application/json' \
            -X PUT 'http://localhost:9200/_wlm/workload_group' \
            -d '{"name":"search_group","resiliency_mode":"soft","resource_limits":{"cpu":0.2,"memory":0.2}}'
        shell: bash

      - name: Checkout OpenSearch-Dashboards
        uses: actions/checkout@v4
        with:
          repository: opensearch-project/OpenSearch-Dashboards
          path: OpenSearch-Dashboards
          ref: ${{ env.OPENSEARCH_DASHBOARDS_VERSION }}

      - name: Checkout Query Insights Dashboards plugin
        uses: actions/checkout@v4
        with:
          path: OpenSearch-Dashboards/plugins/query-insights-dashboards

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version-file: './OpenSearch-Dashboards/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Yarn
        shell: bash
        run: |
          YARN_VERSION=$(node -p "require('./OpenSearch-Dashboards/package.json').engines.yarn")
          npm i -g yarn@$YARN_VERSION

      - name: Bootstrap plugin/OpenSearch-Dashboards
        run: |
          cd OpenSearch-Dashboards/plugins/query-insights-dashboards
          yarn osd bootstrap --single-version=loose

      - name: Run OpenSearch-Dashboards server
        run: |
          cd OpenSearch-Dashboards
          nohup yarn start --no-base-path --no-watch --server.host="0.0.0.0" > dashboards.log 2>&1 &
          sleep 10
          echo "Initial Dashboards log output:"
          head -n 100 dashboards.log || true
        shell: bash

      - name: Wait for OpenSearch-Dashboards to be ready
        run: |
          cd OpenSearch-Dashboards
          echo "Waiting for HTTP server..."
          max_wait=1800
          elapsed=0
          while [ $elapsed -lt $max_wait ]; do
            if curl -s -f http://localhost:5601/api/status > /dev/null 2>&1; then
              echo "HTTP server is responding!"
              break
            fi
            if [ $((elapsed % 30)) -eq 0 ]; then
              echo "[${elapsed}s/${max_wait}s] Still waiting for HTTP..."
              tail -5 dashboards.log || true
            fi
            sleep 10
            elapsed=$((elapsed + 10))
          done
          if ! curl -s -f http://localhost:5601/api/status > /dev/null 2>&1; then
            echo "ERROR: HTTP server failed to start"
            tail -n 200 dashboards.log
            exit 1
          fi
          echo "Waiting for optimizer to finish compiling bundles..."
          max_wait=1800
          elapsed=0
          while [ $elapsed -lt $max_wait ]; do
            if grep -qE "[0-9]+ bundles? compiled successfully" dashboards.log 2>/dev/null; then
              echo "Bundles compiled! Waiting 20s for plugin initialization..."
              sleep 20
              echo "OpenSearch-Dashboards is fully ready!"
              break
            fi
            if [ $((elapsed % 30)) -eq 0 ]; then
              echo "[${elapsed}s/${max_wait}s] Still compiling..."
              if tail -50 dashboards.log 2>/dev/null | grep -q "@osd/optimizer"; then
                recent=$(tail -50 dashboards.log | grep "@osd/optimizer" | tail -1 | grep -oE '\[[0-9]+/[0-9]+\].*' || echo "compiling...")
                echo "  Status: $recent"
              fi
            fi
            sleep 10
            elapsed=$((elapsed + 10))
          done
        shell: bash

      - name: Install Cypress
        run: |
          cd OpenSearch-Dashboards/plugins/query-insights-dashboards
          npx cypress install
        shell: bash

      - name: Cache Cypress
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cypress_cache_folder }}
          key: cypress-cache-v2-${{ matrix.os }}-${{ hashFiles('OpenSearch-Dashboards/plugins/query-insights-dashboards/package.json') }}

      - name: Cypress tests
        uses: cypress-io/github-action@v5
        with:
          working-directory: OpenSearch-Dashboards/plugins/query-insights-dashboards
          command: yarn run cypress run --config defaultCommandTimeout=120000,requestTimeout=120000,responseTimeout=120000,pageLoadTimeout=180000,taskTimeout=120000,execTimeout=120000 --spec cypress/e2e/qi-wlm-interaction/**/*
          wait-on: 'http://localhost:5601'
          wait-on-timeout: 1200
          browser: chrome
        env:
          CYPRESS_CACHE_FOLDER: ${{ matrix.cypress_cache_folder }}
          CI: true
        timeout-minutes: 120

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-qi-wlm-interaction-${{ matrix.os }}
          path: OpenSearch-Dashboards/plugins/query-insights-dashboards/cypress/screenshots

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-qi-wlm-interaction-${{ matrix.os }}
          path: OpenSearch-Dashboards/plugins/query-insights-dashboards/cypress/videos